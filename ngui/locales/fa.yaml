  title: پیکربندی سرور DoH
  dohPriorityList: لیست اولویت سرورهای DoH
  messages:
    - 'DoH (DNS over HTTPS) می‌تواند به طور موثر از آلودگی DNS جلوگیری کند. اما برخی ارائه‌دهندگان DoH ممکن است خودشان آلوده شوند.'
    - سرورهای DoH عمومی عالی در چین شامل alidns، geekdns، rubyfish و غیره هستند
    - در منطقه تایوان شامل quad101 و غیره
    - آمریکا: cloudflare، dns.google و غیره
    - 'لیست: <a href="https://dnscrypt.info/public-servers" target="_blank">public-servers</a>'
    - 'راه‌اندازی سرویس DoH در سرور خودتان توصیه می‌شود <a href="https://github.com/facebookexperimental/doh-proxy" target="_blank">doh-proxy</a>.'
    - بهینه این است که یک یا دو خط بالا قرار دهید. لیست پس از ذخیره با محتوای خالی به پیش‌فرض بازمی‌گردد.
egressPortWhitelist:
  title: لیست سفید پورت خروجی
  tcpPortWhitelist: لیست سفید پورت TCP
  udpPortWhitelist: لیست سفید پورت UDP
  messages:
    - اگر v2rayA روی سرور A که به سرور پروکسی B متصل است راه‌اندازی شده باشد، توجه کنید:
    - 'پروکسی شفاف تمام ترافیک TCP و UDP را مجبور به عبور از سرور پروکسی B می‌کند، جایی که آدرس IP مبدأ با آدرس IP پروکسی B جایگزین می‌شود.'
    - 'برای حل آن، باید آن پورت‌های سرویس را به لیست سفید اضافه کنیم تا از پروکسی عبور نکنند. مثال: ssh(22)، v2raya({v2rayaPort}).'
    - اگر سرور هیچ سرویسی ارائه نمی‌دهد، می‌توانید از پیکربندی صرف‌نظر کنید.
    - 'فرمت: 22 به معنی پورت 22، 20170:20172 به معنی سه پورت 20170 تا 20172.'
