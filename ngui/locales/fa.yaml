  v2rayInvalid: 'geosite.dat، geoip.dat یا v2ray-core ممکن است به درستی نصب نشده باشند'
  v2rayNotV5: 'نسخه v2ray-core v5 نیست. از v5 استفاده کنید یا v2rayA را به v1.5 کاهش دهید'
  coreVersionMismatch: 'عدم تطابق نسخه هسته: نسخه v2raya_core باید دقیقاً با نسخه v2rayA مطابقت داشته باشد. {err}'
about: |-
  <p>v2rayA یک رابط کاربری وب برای V2Ray است.</p>
            <p class="about-small">پورت‌های پیش‌فرض:</p>
            <p class="about-small">2017: پورت سرویس v2rayA</p>
            <p class="about-small">20170: پروتکل SOCKS</p>
            <p class="about-small">20171: پروتکل HTTP</p>
            <p class="about-small">20172: پروتکل HTTP با "قانون تقسیم ترافیک"</p>
            <p class="about-small">سایر پورت‌ها:</p>
            <p class="about-small">32345: tproxy، مورد نیاز پروکسی شفاف</p>
            <p>تمام داده‌ها به صورت محلی ذخیره می‌شوند نه در ابر.</p>
            <p>مشکلات یافت شده را می‌توانید در <a href="https://github.com/v2rayA/v2rayA/issues">issues</a> گزارش دهید.</p>
            <p>مستندات: <a href="https://v2raya.org">https://v2raya.org</a></p>
axios:
  messages:
    optimizeBackend: آدرس سرویس v2rayA را تنظیم کنید؟
    noBackendFound: 'v2rayA در {url} یافت نشد. مطمئن شوید v2rayA در این آدرس در حال اجرا است.'
    cannotCommunicate:
      - 'عدم ارتباط. اگر سرویس شما در حال اجرا است و پورت‌ها به درستی باز هستند، ممکن است مرورگر فعلی به سایت‌های https اجازه دسترسی به منابع http را ندهد.'
      - 'عدم ارتباط. Firefox به سایت‌های https اجازه دسترسی به منابع http را نمی‌دهد.'
  urls:
    usage: 'https://github.com/v2rayA/v2rayA/wiki/Usage'
routingA:
  messages:
    - برای راهنما روی دکمه "Help&Manual" کلیک کنید
  inboundDeprecated: تعریف inbounds در RoutingA منسوخ شده است. لطفاً از تنظیمات inbound سفارشی با قوانین RoutingA استفاده کنید.
  inboundDeprecatedConfirm: 'این پیکربندی RoutingA شامل تعاریف inbound منسوخ شده است. آیا ادامه می‌دهید؟'
outbound:
  addMessage: 'لطفاً نام گروه خروجی را که می‌خواهید اضافه کنید وارد کنید:'
  deleteMessage: 'آیا از <b>حذف</b> خروجی "{outboundName}" مطمئن هستید؟ این عمل قابل بازگشت نیست.'
proxyGroup:
  pickTitle: افزودن به گروه پروکسی
  pickMessage: گروه پروکسی را که این گره باید به آن بپیوندد انتخاب کنید.
  group: گروه پروکسی
driver:
  welcome:
    - ابتدا یک سرور وارد کنید
    - اولین بار استفاده، هیچ سروری وجود ندارد. در اینجا یک سرور وارد یا ایجاد کنید.
  tabs:
    - اشتراک‌ها و سرورها
    - پس از وارد کردن اشتراک‌ها و سرورها، در اینجا می‌توانید آنها را مدیریت کنید.
tproxyWhiteIpGroups:
  title: گروه‌های IP مجاز مستقیم
  messages:
    - گروه IP انتخاب شده مستقیماً از XRay/V2Ray core خارج می‌شود. لطفاً مطمئن شوید سرور DNS شما قابل اعتماد است.
    - بهتر است هنگام استفاده از Nftables از این ویژگی استفاده کنید.
  formName1: برای انتخاب چندگانه Ctrl را نگه دارید
  formName2: IPهای سفارشی (یک در هر خط، فرمت CIDR استاندارد)
  formPlaceholder2: "172.30.0.0/16\nfd00:aaaa:bbbb::/48"
  invalidCustomIps: IPهای سفارشی نامعتبر
  cn: چین
  private: خصوصی
  us: ایالات متحده
  cloudflare: Cloudflare
domainsExcluded:
  title: دامنه‌های حذف شده
  messages:
    - لیستی از نام دامنه‌ها. اگر نتیجه اسنیفینگ با دامنه‌ای در این لیست مطابقت داشت، آدرس هدف بازنشانی نمی‌شود.
  formName: لیست دامنه‌های حذف شده
  formPlaceholder: "courier.push.apple.com\nMijia Cloud\ndlg.io.mi.com"
gfwList:
  title: به‌روزرسانی GFWList
  messages:
    - اگر دسترسی به GitHub در محیط شما دشوار است، می‌توانید آخرین GFWList (geosite.dat) را از GitHub دانلود کنید.
    - اگر فرم ورودی خالی باشد، به طور خودکار از GitHub دانلود می‌شود.
    - 'توجه: فایل اشتباه ممکن است باعث شکست راه‌اندازی سرویس شود.'
  formName: لینک دانلود سفارشی
  wrongCustomLink: لینک دانلود سفارشی اشتباه
tinytun:
  routeScript:
    title: اسکریپت مسیر سفارشی TinyTun
    warning: 'هشدار: اسکریپت‌های نادرست ممکن است شبکه یا مسیریابی سیستم شما را خراب کنند.'
    shellType: نوع Shell
    customShell: سفارشی (مسیر را در زیر مشخص کنید)
    shellPath: مسیر Shell
    shellPathPlaceholder: /usr/bin/bash
    setupScript: اسکریپت راه‌اندازی (پس از شروع TinyTun اجرا می‌شود)
    setupScriptPlaceholder: "# اسکریپت پیکربندی مسیرها هنگام شروع TinyTun\n# مثال: ip route add default dev tun0"
    teardownScript: اسکریپت توقف (قبل از توقف TinyTun اجرا می‌شود)
    teardownScriptPlaceholder: "# اسکریپت حذف مسیرها هنگام توقف TinyTun\n# مثال: ip route del default dev tun0"
  processExclude:
    title: حذف فرآیند سفارشی TinyTun
