    tunBackendEbpf: eBPF (حذف فرآیند cgroupv2)
    backendV2ray: v2ray / xray
    backendSystemDefault: پیش‌فرض سیستم
  messages:
    inboundSniffing: ترافیک ورودی را اسنیف کنید. اگر روشن نباشد، ممکن است برخی ترافیک‌ها به درستی هدایت نشوند.
    gfwlist: بر اساس زمان تغییر فایل که گاهی پس از آخرین نسخه آنلاین است.
    transparentProxy: 'اگر پروکسی شفاف روشن باشد، هیچ پیکربندی اضافی نیاز نیست و تمام ترافیک TCP از v2rayA عبور می‌کند. ارائه سرویس پروکسی به سایر کامپیوترها و docker به عنوان دروازه باید گزینه "اشتراک‌گذاری در LAN" را روشن کند.'
    transparentType: '★tproxy: پشتیبانی از UDP، اما پشتیبانی از docker نمی‌کند. ★redirect: مناسب برای docker، اما از UDP پشتیبانی نمی‌کند و باید پورت محلی 53 را برای جلوگیری از آلودگی DNS اشغال کند. ★tun (TinyTun): پروکسی TUN跨平台، نیاز به فایل باینری tinytun دارد.'
    tproxyExcludedInterfaces: 'پیشوندهای رابط شبکه را تنظیم کنید که نباید از پروکسی شفاف عبور کنند. wildcard * پشتیبانی می‌شود. مثال: docker*, veth*, wg*, ppp*, br-*.'
    tunAutoRoute: 'هنگام فعال بودن، TinyTun به طور خودکار مسیرهای سیستم را پیکربندی می‌کند. هنگام غیرفعال بودن، باید اسکریپت‌های راه‌اندازی/توقف سفارشی برای پیکربندی مسیر ارائه دهید.'
    tunBypassInterfaces: 'رابط‌هایی را که باید از پروکسی TUN حذف شوند انتخاب کنید، یا الگوهای glob سفارشی را در زیر وارد کنید.'
    tunProcessBackend: 'روش حذف فرآیند TinyTun را در لینوکس انتخاب کنید. حالت TUN از /proc برای سازگاری گسترده استفاده می‌کند؛ حالت eBPF از cgroupv2 برای حذف دقیق‌تر فرآیند استفاده می‌کند.'
    tunExcludeProcesses: 'نام فرآیندهای اضافی برای عبور از TinyTun را پیکربندی کنید. یک نام در هر خط توصیه می‌شود.'
    pacMode: 'در اینجا می‌توانید قانون تقسیم ترافیک پورت قانون را تنظیم کنید. به طور پیش‌فرض، پورت "قانون تقسیم ترافیک" 20172 و پروتکل HTTP است.'
    preventDnsSpoofing: '★ارسال درخواست DNS: ارسال درخواست‌های DNS از طریق سرور پروکسی. ★DoH (v2ray-core: 4.22.0+): DNS over HTTPS.'
    specialMode: '★supervisor: نظارت بر آلودگی DNS، رهگیری زودهنگام. ★fakedns: استفاده از استراتژی fakedns برای تسریع حل.'
    tcpFastOpen: 'فرآیند دست‌دهی TCP را برای تسریع برقراری اتصال ساده می‌کند. ممکن است ویژگی‌های بسته را برجسته کند.'
    mux: 'مالتی‌پلکس کردن اتصالات TCP برای کاهش تعداد دست‌دهی، اما بر موارد استفاده با توان بالا مانند تماشای ویدیو، دانلود و تست سرعت تأثیر می‌گذارد.'
    confirmEgressPorts: '<p>شما در حال تنظیم پروکسی شفاف در LANها هستید، لیست سفید پورت خروجی را تأیید کنید.</p><p>لیست سفید:</p><p>TCP: {tcpPorts}</p><p>UDP: {udpPorts}</p>'
    grpcShouldWithTls: gRPC باید با TLS باشد
    ssPluginImpl: '★پیش‌فرض: ''transport'' برای simple-obfs، ''chained'' برای v2ray-plugin. ★chained: ترافیک shadowsocks به پلاگین مستقل هدایت می‌شود. ★transport: توسط لایه حمل v2ray/xray core پردازش می‌شود.'
