    preventDnsSpoofing: '★Перенаправление DNS: отправка DNS запросов через прокси-сервер. ★DoH (v2ray-core: 4.22.0+): DNS over HTTPS.'
    specialMode: '★supervisor: мониторинг DNS загрязнения, раннее перехватывание. ★fakedns: использование стратегии fakedns для ускорения разрешения.'
