    backendSystemDefault: Padrão do Sistema
  messages:
    inboundSniffing: Sniffing de domínio de entrada. Se desativado, pode causar erros de roteamento de domínio.
    gfwlist: Baseado no tempo de modificação do arquivo que às vezes é após a versão mais recente online.
    transparentProxy: Se o proxy transparente estiver ligado, nenhuma configuração extra é necessária e todo o tráfego TCP passará pelo v2rayA. Fornecendo serviço de proxy para outros computadores e docker como gateway deve fazer a opção 'Compartilhar na LAN' ligada.
    transparentType: '★tproxy: suporta UDP, mas não suporta docker. ★redirect: amigável para docker, mas não suporta UDP e precisa ocupar a porta local 53 para dns anti-poluição. ★tun (TinyTun): Proxy transparente TUN multiplataforma, requer binário tinytun; o plano de dados no Linux é processado pelo backend TinyTun, a configuração YAML gerada deve corresponder à versão TinyTun.'
    tproxyExcludedInterfaces: 'Define prefixos de interface que não passam pelo proxy transparente. Suporta curinga * (iptables converte automaticamente para +). Ex: docker*, veth*, wg*, ppp*, br-*. Múltiplos prefixos separados por vírgula.'
    tunAutoRoute: Quando ativado, TinyTun configura automaticamente a rota do sistema. Quando desativado, scripts personalizados de inicializaçã/parada são necessários.
    tunBypassInterfaces: Selecione interfaces para ignorar no proxy TUN, ou insira curingas personalizados abaixo.
    tunProcessBackend: Selecione a implementação de exclusão de processo TinyTun no Linux. Modo TUN usa /proc para busca, compatibilidade forte; modo eBPF usa cgroupv2 para exclusão de processo mais precisa, requer tinytun-ebpf.o (/usr/lib/tinytun/).
    tunExcludeProcesses: 'Configure nomes de processos adicionais para bypass direto. Um por linha, ex: chrome.exe, firefox.'
    pacMode: 'Aqui você pode definir a regra de divisão de tráfego da porta de regra. Por padrão, a "Regra de Divisão de Tráfego" porta é 20172 e protocolo HTTP.'
    preventDnsSpoofing: '★Encaminhar consultas DNS: Encaminha consultas DNS através do servidor proxy. ★DoH (v2ray-core: 4.22.0+): DNS over HTTPS.'
    specialMode: '★supervisor: Monitora contaminação DNS, intercepta precocemente, usa sniffing do v2ray-core para resolver. ★fakedns: Usa estratégia fakedns para aceleração de resolução.'
    tcpFastOpen: Simplifica o processo de handshake do TCP para acelerar o estabelecimento da conexão. Risco de enfatizar as características dos pacotes existe. Pode causar falha na conexão se o seu sistema não suportar.
    mux: Multiplexando conexões TCP para reduzir o número de handshake, mas isso afetará os casos de uso com alta taxa de transferência, como assistir vídeos, baixar e testar a velocidade. Suporta apenas vmess agora.
    confirmEgressPorts: |-
      <p>Você está configurando um proxy transparente em LANs, confirme a lista de permissões da porta de saída.</p>
                                <p>Lista de permissões:</p>
                                <p>TCP: {tcpPorts}</p>
                                <p>UDP: {udpPorts}</p>
    grpcShouldWithTls: gRPC deve estar com TLS
    ssPluginImpl: '★padrão: ''transport'' para simple-obfs, ''chained'' para v2ray-plugin. ★chained: o tráfego shadowsocks será redirecionado para o plugin standalone. ★transport: processado pela camada de transporte do v2ray/xray core diretamente.'
