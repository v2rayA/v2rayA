  internalQueryServers: Internal DNS Servers
  externalQueryServers: External DNS Servers
  messages:
    - '"@:dns.internalQueryServers" is used to query domestic domains, while "@:dns.externalQueryServers" is used to query foreign domains.'
    - 'If "@:dns.externalQueryServers" is left empty, "@:dns.internalQueryServers" will be responsible for querying all domains.'
egressPortWhitelist:
  title: Egress Port Whitelist
  tcpPortWhitelist: TCP Port Whitelist
  udpPortWhitelist: UDP Port Whitelist
  messages:
    - If you deploy v2rayA on server A that provides external services and connect to proxy server B, please note:
    - Transparent proxy will route all TCP/UDP traffic through the proxy.
    - 'Therefore, include the external service ports in the whitelist to bypass the proxy, such as ssh(22), v2raya({v2rayaPort}).'
    - If you do not provide external services or only provide services to LAN hosts, you can leave the whitelist empty.
    - 'Format: 22 means port 22, 20170:20172 means three ports from 20170 to 20172.'
