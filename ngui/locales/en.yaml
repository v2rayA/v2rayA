about: |-
  <p>v2rayA is a Web client for V2Ray.</p>
            <p>Default ports:</p>
            <ul>
              <ol><code>2017</code>: v2rayA backend port</ol>
              <ol><code>20170</code>: SOCKS protocol</ol>
              <ol><code>20171</code>: HTTP protocol</ol>
              <ol><code>20172</code>: HTTP protocol with routing rules</ol>
            </ul>
            <p>Other ports:</p>
            <ul>
              <ol><code>32345</code>: tproxy, required for transparent proxy</ol>
            </ul>
            <p>If you find any issues during use, feel free to <a href="https://github.com/v2rayA/v2rayA/issues">submit an issue</a>.</p>
            <p>Documentation: <a href="https://v2raya.org">https://v2raya.org</a>.</p>
