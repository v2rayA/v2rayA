name: Pull Request Check
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.go"
      - "service/**"
      - "gui/**"
      - ".github/workflows/*.yml"
jobs:
  Build_v2rayA_Web:
    uses: ./.github/workflows/_build_web.yml

  Build_v2rayA:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
          os: [ubuntu-latest, windows-latest, macos-latest]
    needs: Build_v2rayA_Web
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: web
        path: service/server/router/web
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        cache-dependency-path: |
          service/go.mod
          service/go.sum
        go-version: '1.26'
    - name: Build v2rayA
      shell: bash
      run: |
        mkdir v2raya_bin
        CurrentDir="$(pwd)"
        date=$(git -C "$CurrentDir" log -1 --format="%cd" --date=short | sed s/-//g)
        count=$(git -C "$CurrentDir" rev-list --count HEAD)
        commit=$(git -C "$CurrentDir" rev-parse --short HEAD)
        version="unstable-$date.r${count}.$commit"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          win_ex_name=".exe"
          os="windows"
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          os="darwin"
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          os="linux"
        fi
        cd "$CurrentDir"/service
        # All PR builds target amd64/arm64 on linux/windows/darwin — all support TinyTun
        for arch in amd64 arm64; do
          GOARCH="$arch" CGO_ENABLED=0 go build -tags "tinytun" -ldflags "-X github.com/v2rayA/v2rayA/conf.Version=$version -s -w" -o "$CurrentDir"/v2raya_bin/v2raya_pr_build_"$os"_"$arch"_"$version""$win_ex_name"
        done
    - name: Upload Zip File to Artifacts
      uses: nanoufo/action-upload-artifacts-and-release-assets@v2
      with:
        path: v2raya_bin/*
